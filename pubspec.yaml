  flutter_local_notifications: ^21.0.0
  universal_html: ^2.3.0
  flutter_inappwebview: ^6.1.5
  timeago: ^3.7.1
  pdf: ^3.12.0
  diffutil_dart: ^4.0.1
  flutter_downloader: ^1.12.0
  permission_handler: ^12.0.1
  fluttertoast: ^9.0.0
  printing: ^5.14.3
  audioplayers: ^6.6.0
  dotted_border: ^3.1.0
  expandable_bottom_sheet: ^1.1.1+1
  share_plus: ^12.0.1
  rect_getter: ^1.1.0
  scroll_to_index: ^3.0.1
  http_parser: ^4.1.2
  http: ^1.6.0
  path: ^1.9.1
  syncfusion_flutter_datepicker: ^33.1.45
  sign_in_with_apple: ^7.0.1
  uuid: ^4.5.3
  just_the_tooltip: ^0.0.12
  custom_info_window: ^1.0.1
  custom_marker: ^1.0.0
  photo_view: ^0.15.0
  flutter_slidable: ^4.0.3
  app_links: ^7.0.0
  syncfusion_flutter_sliders: ^33.1.45
  syncfusion_flutter_core: ^33.1.45
  flutter_xlider: ^3.5.0
  video_player: ^2.11.1
  chewie: ^1.13.0
  firebase_auth: ^6.3.0
  readmore: ^3.0.0
  lottie: ^3.3.2
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  skeletonizer: ^2.1.3
  app_tracking_transparency: ^2.0.6+1
  firebase_analytics: ^12.2.0
  facebook_app_events: ^0.26.0
  tiktok_events_sdk: ^1.1.3
  dotted_line: ^3.2.3




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.30.0
  build_runner: ^2.10.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/language/
    - assets/json/
    - assets/map/
    - assets/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/font/Outfit-Light.ttf
          weight: 300
        - asset: assets/font/Outfit-Regular.ttf
          weight: 400
        - asset: assets/font/Outfit-Medium.ttf
          weight: 500
        - asset: assets/font/Outfit-Bold.ttf
          weight: 700
